version: '3.8'

services:
  contact-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3004:3004"
    environment:
      - SERVICE_PORT=3004
      - SERVICE_NAME=cogquiz-contact-service
      - NODE_ENV=development
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-secret}
      - SMTP_USER=${SMTP_USER:-cogquizoutbound@gmail.com}
      - SMTP_PASS=${SMTP_PASS}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
    restart: unless-stopped
    networks:
      - cogquiz-network

networks:
  cogquiz-network:
    driver: bridge
